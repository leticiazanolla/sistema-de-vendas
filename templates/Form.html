<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Vendas</title>

<link rel="stylesheet" href="../static/style.css">
<script src="../static/lib-vendas.js" defer></script>

</head>

<body align="center">

<h1>Finalizando venda</h1>

<form id="formVenda">

<label for="nomeVendedor">Nome do Vendedor:</label>
<input type="text" id="nomeVendedor" required>
<br><br>

<label for="valorVenda">Valor da Venda:</label>
<input type="number" id="valorVenda" required>
<br><br>

<button type="button" onclick="cadastrar()">Cadastrar</button>
<button type="button" onclick="limparCampos()">Limpar</button>

</form>

<table id="tabelaVendas">

<thead>
<tr>
<th>ID</th>
<th>Data</th>
<th>Nome do Vendedor(a)</th>
<th>Valor</th>
<th>Desconto</th>
<th>Valor com Desconto</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="corpoTabela"></tbody>

</table>

</body>
</html>
